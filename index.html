<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Nexus Invest | Crypto Asset Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #eef2f7, #e0e6ef);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Main Browser Window */
    .browser {
      width: 1400px;
      max-width: 96vw;
      height: 92vh;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Tabs Bar */
    .tabs-container {
      background: rgba(248, 250, 252, 0.95);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      padding: 12px 12px 0 12px;
      flex-shrink: 0;
    }

    .tabs-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 6px;
    }

    .tab {
      background: rgba(255, 255, 255, 0.7);
      border-radius: 16px 16px 12px 12px;
      padding: 8px 16px;
      display: flex;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid rgba(0, 0, 0, 0.05);
      white-space: nowrap;
    }

    .tab.active {
      background: white;
      border-color: rgba(0, 0, 0, 0.12);
    }

    .new-tab-btn {
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 30px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 20px;
      margin-top: 4px;
    }

    /* Navigation Bar */
    .nav-bar {
      padding: 12px 20px;
      display: flex;
      gap: 14px;
      background: rgba(255, 255, 255, 0.7);
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .nav-group {
      display: flex;
      gap: 8px;
      background: rgba(248, 250, 252, 0.7);
      padding: 4px 8px;
      border-radius: 40px;
    }

    .nav-btn {
      background: transparent;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 40px;
      font-size: 20px;
      cursor: pointer;
    }

    .url-input {
      width: 100%;
      padding: 10px 18px;
      background: white;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 48px;
      outline: none;
    }

    .feature-bar {
      display: flex;
      gap: 6px;
      padding: 6px 20px;
      background: rgba(245, 248, 250, 0.8);
      border-bottom: 1px solid rgba(0, 0, 0, 0.04);
      overflow-x: auto;
    }

    .feature-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feature-btn:hover {
      background: rgba(59, 130, 246, 0.1);
      color: #2563eb;
    }

    .feature-btn.active {
      background: #3b82f6;
      color: white;
    }

    /* Content Area */
    .content-area {
      flex: 1;
      position: relative;
      margin: 4px 8px 8px 8px;
      border-radius: 24px;
      overflow: hidden;
      background: white;
    }

    .iframe-pane {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .feature-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      overflow-y: auto;
      padding: 28px 32px;
      z-index: 5;
      border-radius: 20px;
    }

    .hidden-panel {
      display: none;
    }

    .panel-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #0f172a, #3b82f6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* Investment Dashboard Styles */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 24px;
      padding: 20px;
      color: white;
    }

    .stat-card h3 {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
    }

    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .asset-card {
      background: white;
      border-radius: 24px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #eef2ff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
    }

    .asset-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.15);
      border-color: #3b82f6;
    }

    .asset-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .asset-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      border-radius: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .asset-info h3 {
      font-size: 18px;
      font-weight: 600;
      color: #0f172a;
    }

    .asset-symbol {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
    }

    .asset-price {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin: 12px 0;
    }

    .price-change {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
    }

    .positive {
      background: #10b98120;
      color: #10b981;
    }

    .negative {
      background: #ef444420;
      color: #ef4444;
    }

    .asset-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eef2ff;
      font-size: 13px;
      color: #64748b;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      border-radius: 32px;
      max-width: 500px;
      width: 90%;
      padding: 32px;
      animation: slideUp 0.3s ease;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
    }

    .close-modal {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #64748b;
      transition: 0.2s;
    }

    .close-modal:hover {
      color: #ef4444;
    }

    .modal-asset-info {
      background: #f8fafc;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: center;
    }

    .modal-price {
      font-size: 36px;
      font-weight: 700;
      color: #0f172a;
      margin: 8px 0;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin: 24px 0;
    }

    .btn {
      flex: 1;
      padding: 12px 24px;
      border-radius: 48px;
      border: none;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-buy {
      background: #10b981;
      color: white;
    }

    .btn-buy:hover {
      background: #059669;
      transform: scale(0.98);
    }

    .btn-sell {
      background: #ef4444;
      color: white;
    }

    .btn-sell:hover {
      background: #dc2626;
      transform: scale(0.98);
    }

    .amount-input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 48px;
      font-size: 16px;
      margin: 16px 0;
      outline: none;
      transition: 0.2s;
    }

    .amount-input:focus {
      border-color: #3b82f6;
    }

    .total-value {
      background: #f1f5f9;
      padding: 12px;
      border-radius: 16px;
      text-align: center;
      margin-top: 16px;
    }

    .portfolio-alert {
      background: #fef3c7;
      border-left: 4px solid #f59e0b;
      padding: 12px;
      border-radius: 12px;
      margin-top: 16px;
      font-size: 13px;
    }

    .loading-spinner {
      text-align: center;
      padding: 40px;
      color: #64748b;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 16px;
      border-radius: 16px;
      text-align: center;
    }

    .refresh-btn {
      background: #f1f5f9;
      border: 1px solid #cbd5e1;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 14px;
      margin-left: 12px;
    }
  </style>
</head>
<body>
<div class="browser">
  <div class="tabs-container">
    <div class="tabs-row" id="tabsRow"></div>
    <div style="display: flex; justify-content: flex-end;">
      <button class="new-tab-btn" id="newTabBtn">+</button>
    </div>
  </div>
  <div class="nav-bar">
    <div class="nav-group">
      <button class="nav-btn" id="backBtn">←</button>
      <button class="nav-btn" id="forwardBtn">→</button>
      <button class="nav-btn" id="reloadBtn">⟳</button>
    </div>
    <div class="url-bar-container">
      <input type="text" class="url-input" id="urlInput" placeholder="Search or enter address...">
    </div>
    <div class="action-icons">
      <button class="icon-btn" id="homeBtn" style="background:transparent; width:38px;">🏠</button>
    </div>
  </div>
  <div class="feature-bar">
    <button class="feature-btn active" data-panel="invest">📈 Invest & Trade</button>
    <button class="feature-btn" data-panel="portfolio">💼 My Portfolio</button>
    <button class="feature-btn" data-panel="history">📜 Trade History</button>
  </div>
  <div class="content-area">
    <iframe id="webFrame" class="iframe-pane" src="about:blank" style="display: none;"></iframe>
    
    <!-- INVESTMENT DASHBOARD -->
    <div id="investPanel" class="feature-panel">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div class="panel-title">📈 Live Crypto Assets</div>
        <button id="refreshPricesBtn" class="refresh-btn">🔄 Refresh Prices</button>
      </div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <h3>Total Portfolio Value</h3>
          <div class="stat-value" id="totalPortfolioValue">$0.00</div>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #3b82f6, #1e40af);">
          <h3>24h Change</h3>
          <div class="stat-value" id="totalChange">0.00%</div>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
          <h3>Assets Tracked</h3>
          <div class="stat-value" id="assetsCount">0</div>
        </div>
      </div>
      <div id="assetsContainer" class="assets-grid">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Loading live crypto prices...</p>
        </div>
      </div>
    </div>

    <!-- PORTFOLIO PANEL -->
    <div id="portfolioPanel" class="feature-panel hidden-panel">
      <div class="panel-title">💼 My Investment Portfolio</div>
      <div id="portfolioContainer"></div>
    </div>

    <!-- TRADE HISTORY PANEL -->
    <div id="historyPanel" class="feature-panel hidden-panel">
      <div class="panel-title">📜 Trade History</div>
      <div id="historyContainer"></div>
      <button id="clearHistoryBtn" class="refresh-btn" style="margin-top: 20px;">Clear History</button>
    </div>
  </div>
</div>

<!-- TRADE MODAL -->
<div id="tradeModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalAssetName">Bitcoin</h2>
      <button class="close-modal" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-asset-info">
      <div style="font-size: 48px;" id="modalAssetIcon">₿</div>
      <div class="modal-price" id="modalAssetPrice">$0.00</div>
      <div id="modalPriceChange"></div>
    </div>
    <div class="action-buttons">
      <button class="btn btn-buy" id="buyActionBtn">Buy</button>
      <button class="btn btn-sell" id="sellActionBtn">Sell</button>
    </div>
    <input type="number" id="tradeAmount" class="amount-input" placeholder="Enter amount in USD" step="0.01">
    <div id="tradeResult" class="total-value">
      You will receive: <strong id="cryptoAmount">0.0000</strong> <span id="cryptoSymbol">BTC</span>
    </div>
    <div id="tradeError" class="portfolio-alert" style="display: none; background: #fee2e2; color:#dc2626;"></div>
    <button id="confirmTradeBtn" class="btn btn-buy" style="width: 100%; margin-top: 16px;">Confirm Transaction</button>
  </div>
</div>

<script>
  // User Portfolio Data
  let userPortfolio = {
    balance: 10000.00, // USD balance for trading
    holdings: {} // { BTC: 0.5, ETH: 2.3 }
  };
  
  let tradeHistory = [];
  let currentAsset = null;
  let currentPrices = {};
  let currentAction = 'buy';
  let activePanel = 'invest';

  // Load saved data
  function loadSavedData() {
    const savedPortfolio = localStorage.getItem('nexus_portfolio');
    if (savedPortfolio) {
      userPortfolio = JSON.parse(savedPortfolio);
    } else {
      userPortfolio = {
        balance: 10000.00,
        holdings: { BTC: 0.025, ETH: 0.5, SOL: 2.0, ADA: 100 }
      };
    }
    const savedHistory = localStorage.getItem('nexus_trade_history');
    if (savedHistory) tradeHistory = JSON.parse(savedHistory);
  }

  function saveData() {
    localStorage.setItem('nexus_portfolio', JSON.stringify(userPortfolio));
    localStorage.setItem('nexus_trade_history', JSON.stringify(tradeHistory));
  }

  // Fetch crypto prices from CoinGecko API (free, no API key required)
  async function fetchCryptoPrices() {
    const assets = ['bitcoin', 'ethereum', 'solana', 'cardano', 'dogecoin', 'polkadot', 'chainlink', 'uniswap'];
    const symbols = ['BTC', 'ETH', 'SOL', 'ADA', 'DOGE', 'DOT', 'LINK', 'UNI'];
    
    try {
      const response = await fetch(
        'https://api.coingecko.com/api/v3/simple/price?ids=' + assets.join(',') + 
        '&vs_currencies=usd&include_24hr_change=true'
      );
      const data = await response.json();
      
      const prices = {};
      for (let i = 0; i < assets.length; i++) {
        const assetData = data[assets[i]];
        if (assetData) {
          prices[symbols[i]] = {
            price: assetData.usd,
            change24h: assetData.usd_24h_change || 0,
            name: assets[i].charAt(0).toUpperCase() + assets[i].slice(1),
            symbol: symbols[i],
            icon: getAssetIcon(symbols[i])
          };
        }
      }
      return prices;
    } catch (error) {
      console.error('API Error:', error);
      // Fallback mock data if API fails
      return getMockPrices();
    }
  }

  function getMockPrices() {
    return {
      BTC: { price: 62500, change24h: 2.5, name: 'Bitcoin', symbol: 'BTC', icon: '₿' },
      ETH: { price: 3200, change24h: -1.2, name: 'Ethereum', symbol: 'ETH', icon: 'Ξ' },
      SOL: { price: 145, change24h: 5.8, name: 'Solana', symbol: 'SOL', icon: '◎' },
      ADA: { price: 0.45, change24h: -0.8, name: 'Cardano', symbol: 'ADA', icon: '₳' },
      DOGE: { price: 0.12, change24h: 3.2, name: 'Dogecoin', symbol: 'DOGE', icon: 'Ð' },
      DOT: { price: 7.8, change24h: -2.1, name: 'Polkadot', symbol: 'DOT', icon: '●' },
      LINK: { price: 15.2, change24h: 1.5, name: 'Chainlink', symbol: 'LINK', icon: '🔗' },
      UNI: { price: 6.8, change24h: -0.5, name: 'Uniswap', symbol: 'UNI', icon: '🦄' }
    };
  }

  function getAssetIcon(symbol) {
    const icons = { BTC: '₿', ETH: 'Ξ', SOL: '◎', ADA: '₳', DOGE: 'Ð', DOT: '●', LINK: '🔗', UNI: '🦄' };
    return icons[symbol] || '📊';
  }

  // Render assets grid
  async function renderAssets() {
    const container = document.getElementById('assetsContainer');
    if (!container) return;
    
    container.innerHTML = '<div class="loading-spinner"><div class="spinner"></div><p>Loading live prices...</p></div>';
    
    currentPrices = await fetchCryptoPrices();
    const assetsArray = Object.values(currentPrices);
    
    document.getElementById('assetsCount').innerHTML = assetsArray.length;
    
    container.innerHTML = assetsArray.map(asset => {
      const changeClass = asset.change24h >= 0 ? 'positive' : 'negative';
      const changeSign = asset.change24h >= 0 ? '+' : '';
      const userHolding = userPortfolio.holdings[asset.symbol] || 0;
      const holdingValue = userHolding * asset.price;
      
      return `
        <div class="asset-card" data-symbol="${asset.symbol}">
          <div class="asset-header">
            <div class="asset-icon">${asset.icon}</div>
            <div class="asset-info">
              <h3>${asset.name}</h3>
              <div class="asset-symbol">${asset.symbol}</div>
            </div>
          </div>
          <div class="asset-price">$${asset.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</div>
          <div class="price-change ${changeClass}">
            ${changeSign}${asset.change24h.toFixed(2)}%
          </div>
          <div class="asset-stats">
            <span>💰 24h Volume</span>
            <span>📊 Your: ${userHolding > 0 ? userHolding.toFixed(4) + ' ' + asset.symbol : 'None'}</span>
          </div>
          ${userHolding > 0 ? `<div class="asset-stats"><span>💎 Value</span><span>$${holdingValue.toFixed(2)}</span></div>` : ''}
        </div>
      `;
    }).join('');
    
    // Add click handlers
    document.querySelectorAll('.asset-card').forEach(card => {
      card.addEventListener('click', () => {
        const symbol = card.getAttribute('data-symbol');
        openTradeModal(symbol);
      });
    });
    
    updatePortfolioStats();
  }

  function updatePortfolioStats() {
    let totalValue = userPortfolio.balance;
    Object.keys(userPortfolio.holdings).forEach(symbol => {
      if (currentPrices[symbol]) {
        totalValue += userPortfolio.holdings[symbol] * currentPrices[symbol].price;
      }
    });
    
    document.getElementById('totalPortfolioValue').innerHTML = `$${totalValue.toFixed(2)}`;
    
    // Calculate weighted 24h change
    let weightedChange = 0;
    let totalWeight = 0;
    Object.keys(userPortfolio.holdings).forEach(symbol => {
      if (currentPrices[symbol]) {
        const holdingValue = userPortfolio.holdings[symbol] * currentPrices[symbol].price;
        weightedChange += holdingValue * (currentPrices[symbol].change24h / 100);
        totalWeight += holdingValue;
      }
    });
    const avgChange = totalWeight > 0 ? (weightedChange / totalWeight) * 100 : 0;
    document.getElementById('totalChange').innerHTML = `${avgChange >= 0 ? '+' : ''}${avgChange.toFixed(2)}%`;
  }

  function renderPortfolio() {
    const container = document.getElementById('portfolioContainer');
    if (!container) return;
    
    const holdingsArray = Object.entries(userPortfolio.holdings).filter(([_, amount]) => amount > 0);
    
    if (holdingsArray.length === 0) {
      container.innerHTML = '<div class="loading-spinner"><p>No assets in portfolio. Start investing!</p></div>';
      return;
    }
    
    let totalValue = userPortfolio.balance;
    container.innerHTML = `
      <div class="stats-grid">
        <div class="stat-card" style="background: linear-gradient(135deg, #10b981, #059669);">
          <h3>Available Balance</h3>
          <div class="stat-value">$${userPortfolio.balance.toFixed(2)}</div>
        </div>
      </div>
      <div class="assets-grid">
        ${holdingsArray.map(([symbol, amount]) => {
          const price = currentPrices[symbol]?.price || 0;
          const value = amount * price;
          const change = currentPrices[symbol]?.change24h || 0;
          const changeClass = change >= 0 ? 'positive' : 'negative';
          return `
            <div class="asset-card">
              <div class="asset-header">
                <div class="asset-icon">${getAssetIcon(symbol)}</div>
                <div class="asset-info">
                  <h3>${currentPrices[symbol]?.name || symbol}</h3>
                  <div class="asset-symbol">${symbol}</div>
                </div>
              </div>
              <div class="asset-price">${amount.toFixed(6)} ${symbol}</div>
              <div class="asset-stats">≈ $${value.toFixed(2)}</div>
              <div class="price-change ${changeClass}">${change >= 0 ? '+' : ''}${change.toFixed(2)}%</div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  function renderTradeHistory() {
    const container = document.getElementById('historyContainer');
    if (!container) return;
    
    if (tradeHistory.length === 0) {
      container.innerHTML = '<div class="loading-spinner"><p>No trades yet. Start investing!</p></div>';
      return;
    }
    
    container.innerHTML = tradeHistory.map(trade => `
      <div class="asset-card" style="margin-bottom: 12px;">
        <div class="asset-header">
          <div class="asset-icon">${trade.icon}</div>
          <div class="asset-info">
            <h3>${trade.action === 'buy' ? '🟢 BUY' : '🔴 SELL'} ${trade.symbol}</h3>
            <div class="asset-symbol">${new Date(trade.date).toLocaleString()}</div>
          </div>
        </div>
        <div class="asset-price">${trade.amount} ${trade.symbol}</div>
        <div class="asset-stats">💰 $${trade.usdAmount.toFixed(2)} @ $${trade.pricePerUnit.toFixed(2)}</div>
      </div>
    `).join('');
  }

  function openTradeModal(symbol) {
    currentAsset = currentPrices[symbol];
    if (!currentAsset) return;
    
    document.getElementById('modalAssetName').innerHTML = currentAsset.name;
    document.getElementById('modalAssetIcon').innerHTML = currentAsset.icon;
    document.getElementById('modalAssetPrice').innerHTML = `$${currentAsset.price.toFixed(2)}`;
    const changeClass = currentAsset.change24h >= 0 ? 'positive' : 'negative';
    const changeSign = currentAsset.change24h >= 0 ? '+' : '';
    document.getElementById('modalPriceChange').innerHTML = `<span class="price-change ${changeClass}">${changeSign}${currentAsset.change24h.toFixed(2)}% (24h)</span>`;
    document.getElementById('cryptoSymbol').innerHTML = symbol;
    document.getElementById('tradeAmount').value = '';
    document.getElementById('tradeResult').innerHTML = `You will receive: <strong id="cryptoAmount">0.0000</strong> <span id="cryptoSymbol">${symbol}</span>`;
    document.getElementById('tradeError').style.display = 'none';
    currentAction = 'buy';
    document.getElementById('confirmTradeBtn').className = 'btn btn-buy';
    document.getElementById('confirmTradeBtn').innerHTML = 'Confirm Purchase';
    
    document.getElementById('tradeModal').style.display = 'flex';
    
    // Update calculation on input
    document.getElementById('tradeAmount').oninput = updateTradeCalculation;
  }

  function updateTradeCalculation() {
    const usdAmount = parseFloat(document.getElementById('tradeAmount').value);
    if (isNaN(usdAmount) || usdAmount <= 0) {
      document.getElementById('cryptoAmount').innerHTML = '0.0000';
      return;
    }
    const cryptoAmount = usdAmount / currentAsset.price;
    document.getElementById('cryptoAmount').innerHTML = cryptoAmount.toFixed(6);
  }

  function executeTrade() {
    const usdAmount = parseFloat(document.getElementById('tradeAmount').value);
    const errorDiv = document.getElementById('tradeError');
    
    if (isNaN(usdAmount) || usdAmount <= 0) {
      errorDiv.innerHTML = 'Please enter a valid amount';
      errorDiv.style.display = 'block';
      return;
    }
    
    const cryptoAmount = usdAmount / currentAsset.price;
    
    if (currentAction === 'buy') {
      if (userPortfolio.balance < usdAmount) {
        errorDiv.innerHTML = `Insufficient balance. Available: $${userPortfolio.balance.toFixed(2)}`;
        errorDiv.style.display = 'block';
        return;
      }
      
      userPortfolio.balance -= usdAmount;
      userPortfolio.holdings[currentAsset.symbol] = (userPortfolio.holdings[currentAsset.symbol] || 0) + cryptoAmount;
      
      tradeHistory.unshift({
        id: Date.now(),
        action: 'buy',
        symbol: currentAsset.symbol,
        amount: cryptoAmount,
        usdAmount: usdAmount,
        pricePerUnit: currentAsset.price,
        date: new Date().toISOString(),
        icon: currentAsset.icon
      });
      
      alert(`✅ Successfully bought ${cryptoAmount.toFixed(6)} ${currentAsset.symbol} for $${usdAmount.toFixed(2)}`);
    } else {
      const currentHolding = userPortfolio.holdings[currentAsset.symbol] || 0;
      if (currentHolding < cryptoAmount) {
        errorDiv.innerHTML = `Insufficient ${currentAsset.symbol} balance. Available: ${currentHolding.toFixed(6)} ${currentAsset.symbol}`;
        errorDiv.style.display = 'block';
        return;
      }
      
      userPortfolio.holdings[currentAsset.symbol] -= cryptoAmount;
      userPortfolio.balance += usdAmount;
      
      if (userPortfolio.holdings[currentAsset.symbol] < 0.000001) {
        delete userPortfolio.holdings[currentAsset.symbol];
      }
      
      tradeHistory.unshift({
        id: Date.now(),
        action: 'sell',
        symbol: currentAsset.symbol,
        amount: cryptoAmount,
        usdAmount: usdAmount,
        pricePerUnit: currentAsset.price,
        date: new Date().toISOString(),
        icon: currentAsset.icon
      });
      
      alert(`✅ Successfully sold ${cryptoAmount.toFixed(6)} ${currentAsset.symbol} for $${usdAmount.toFixed(2)}`);
    }
    
    saveData();
    closeModal();
    renderAssets();
    renderPortfolio();
    renderTradeHistory();
  }

  function closeModal() {
    document.getElementById('tradeModal').style.display = 'none';
  }

  function clearHistory() {
    if (confirm('Clear all trade history?')) {
      tradeHistory = [];
      saveData();
      renderTradeHistory();
    }
  }

  // Panel switching
  function switchPanel(panel) {
    activePanel = panel;
    document.querySelectorAll('.feature-panel').forEach(p => p.classList.add('hidden-panel'));
    document.getElementById(`${panel}Panel`).classList.remove('hidden-panel');
    document.querySelectorAll('.feature-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.feature-btn[data-panel="${panel}"]`).classList.add('active');
    
    if (panel === 'invest') renderAssets();
    if (panel === 'portfolio') renderPortfolio();
    if (panel === 'history') renderTradeHistory();
  }

  // Browser navigation (minimal for demo)
  let tabs = [{ id: 1, title: 'Invest', url: 'about:blank' }];
  let activeTabId = 1;
  
  function renderTabs() {
    const container = document.getElementById('tabsRow');
    container.innerHTML = tabs.map(tab => `
      <div class="tab ${activeTabId === tab.id ? 'active' : ''}" data-id="${tab.id}">
        <span>📈</span><span>${tab.title}</span>
        <button class="tab-close" style="background:none; border:none;">×</button>
      </div>
    `).join('');
  }

  // Initialize
  async function init() {
    loadSavedData();
    await renderAssets();
    renderPortfolio();
    renderTradeHistory();
    renderTabs();
    
    // Event listeners
    document.getElementById('refreshPricesBtn').addEventListener('click', () => renderAssets());
    document.getElementById('buyActionBtn').addEventListener('click', () => { currentAction = 'buy'; document.getElementById('confirmTradeBtn').className = 'btn btn-buy'; document.getElementById('confirmTradeBtn').innerHTML = 'Confirm Purchase'; updateTradeCalculation(); });
    document.getElementById('sellActionBtn').addEventListener('click', () => { currentAction = 'sell'; document.getElementById('confirmTradeBtn').className = 'btn btn-sell'; document.getElementById('confirmTradeBtn').innerHTML = 'Confirm Sale'; updateTradeCalculation(); });
    document.getElementById('confirmTradeBtn').addEventListener('click', executeTrade);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
    document.querySelectorAll('.feature-btn').forEach(btn => {
      btn.addEventListener('click', () => switchPanel(btn.getAttribute('data-panel')));
    });
    
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('tradeModal')) closeModal(); });
    
    // Simple browser nav
    document.getElementById('homeBtn').addEventListener('click', () => switchPanel('invest'));
    document.getElementById('reloadBtn').addEventListener('click', () => renderAssets());
  }
  
  init();
</script>
</body>
</html>
